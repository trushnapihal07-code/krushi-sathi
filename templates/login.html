<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Krushi Sathi</title>
  <style>
   body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
   }

   body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("{{ url_for('static', filename='farmerb2.webp') }}") center/cover no-repeat;
      filter: blur(8px) brightness(0.7);
      z-index: -1;
   }

   .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
   }

   .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      width: 320px;
      text-align: center;
   }

   .box h2 {
      margin-bottom: 25px;
      color: #145A32;
   }

   .box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
   }

   .box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #145A32, #27AE60);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
   }

   .error {
      color: red;
      margin-bottom: 10px;
      font-size: 14px;
   }

   .signup-link {
      margin-top: 15px;
      font-size: 14px;
   }

   .signup-link a {
      color: #145A32;
      text-decoration: none;
      font-weight: bold;
   }
  </style>
</head>
<body>

<div class="container">
  <div class="box">
    <h2>Login</h2>

    <!-- Flash messages from Flask -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <input type="text" name="login_id" placeholder="Email or Phone Number" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="/signup">Sign up here</a>
    </div>
  </div>
</div>

</body>
</html>
