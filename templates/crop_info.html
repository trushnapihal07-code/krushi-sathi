<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Krushi Sathi - Crop & Soil Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">

<style>

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url('{{ url_for("static", filename="farmerb2.webp") }}') center/cover no-repeat;
  filter: blur(8px) brightness(0.7);
  z-index: -1;
}

body {
  font-family: 'Noto Sans Devanagari', 'Mangal', sans-serif;
}

.container {
    max-width: 520px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
}

button {
    background: #2e7d32;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    background: #eef6ee;
    padding: 15px;
    border-radius: 6px;
    display: none;
}

</style>
</head>

<body>

<div class="container">

<select id="lang" onchange="changeLanguage()">
  <option value="mr" selected>मराठी</option>
  <option value="hi">हिंदी</option>
  <option value="en">English</option>
</select>

<h2 id="title">🌱 पिक आणि माती भविष्यवाणी</h2>

<select id="district"></select>
<select id="taluka"></select>
<select id="season"></select>

<button onclick="predictCrop()" id="btn">भविष्यवाणी करा</button>

<div id="result" class="result"></div>

</div>

<script>

// ---------------- TEXT ----------------
const text = {
    en: {
        title: "🌱 Crop & Soil Prediction",
        btn: "Predict",
        crop: "Recommended Crop",
        soil: "Suitable Soil"
    },
    hi: {
        title: "🌱 फसल और मिट्टी भविष्यवाणी",
        btn: "भविष्यवाणी करें",
        crop: "सुझाई गई फसल",
        soil: "उपयुक्त मिट्टी"
    },
    mr: {
        title: "🌱 पिक आणि माती भविष्यवाणी",
        btn: "भविष्यवाणी करा",
        crop: "शिफारस केलेले पिक",
        soil: "योग्य माती"
    }
};

// ----------- FETCH OPTIONS ------------
function loadOptions(lang = "mr") {

    fetch(`/get-options?lang=${lang}`)
    .then(res => res.json())
    .then(data => {
        renderDropdowns(data);
    })
    .catch(err => console.error("Error loading dropdown:", err));
}

// ----------- RENDER FUNCTION -----------
function renderDropdowns(data) {

    const districtSelect = document.getElementById("district");
    const talukaSelect = document.getElementById("taluka");
    const seasonSelect = document.getElementById("season");

    districtSelect.innerHTML = "";
    talukaSelect.innerHTML = "";
    seasonSelect.innerHTML = "";

    data.districts.forEach(item => {
        let option = document.createElement("option");
        option.textContent = item.label;
        option.value = item.value;
        districtSelect.appendChild(option);
    });

    data.talukas.forEach(item => {
        let option = document.createElement("option");
        option.textContent = item.label;
        option.value = item.value;
        talukaSelect.appendChild(option);
    });

    data.seasons.forEach(item => {
        let option = document.createElement("option");
        option.textContent = item.label;
        option.value = item.value;
        seasonSelect.appendChild(option);
    });
}

// ----------- LANGUAGE CHANGE -----------
function changeLanguage() {

    const lang = document.getElementById("lang").value;

    document.getElementById("title").innerText = text[lang].title;
    document.getElementById("btn").innerText = text[lang].btn;

    loadOptions(lang);
}

// ----------- PREDICT FUNCTION ----------
function predictCrop() {

  const data = {
    district: document.getElementById("district").value,
    taluka: document.getElementById("taluka").value,
    season: document.getElementById("season").value,
    lang: document.getElementById("lang").value
  };

  fetch(`/predict`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {

      if(result.error){
          alert(result.error);
          return;
      }

      const lang = document.getElementById("lang").value;

      document.getElementById("result").style.display = "block";
      document.getElementById("result").innerHTML =
        text[lang].crop + ": " + result.crop +
        "<br>" +
        text[lang].soil + ": " + result.soil;
  })
  .catch(err => console.error("Prediction error:", err));
}

// ----------- INITIAL LOAD -----------
loadOptions("mr");

</script>

</body>
</html>
